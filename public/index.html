<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spark</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --bg-main: #101513;
    --bg-panel: #171e23;
    --bg-input: #222b31;
    --bg-hover: #26352f;
    --bg-active: #263b35;
    --border-color: #253037;
    --border-color-2: #273239;
    --text-main: #d9e6e1;
    --text-bright: #f3fbf8;
    --text-dim: #8f9c99;
    --text-dim-2: #c4d3ce;
    --accent: #55f5c8;
    --accent-hover: #2bd9ac;
    --accent-hot: #ff6f61;
    --danger: #ff6b6b;
    --bubble-mine: #245c51;
    --bubble-other: #263038;
    --bubble-other-border: rgba(255,255,255,0.08);
    --chat-bg: rgba(18,24,29,0.92);
    --composer-bg: rgba(17,22,27,0.62);
    --tick: #93b0a8;
    --tick-read: #55f5c8;
    --overlay: rgba(0,0,0,0.5);
    --shadow-soft: 0 18px 45px rgba(0,0,0,0.24);
  }
  body.light {
    --bg-main: #f6f1e8;
    --bg-panel: #fffaf2;
    --bg-input: #ece3d5;
    --bg-hover: #e2f1ec;
    --bg-active: #d8eee8;
    --border-color: #e0d7c8;
    --border-color-2: #e5dccc;
    --text-main: #26302e;
    --text-bright: #121816;
    --text-dim: #6b7a89;
    --text-dim-2: #44524f;
    --accent: #00a884;
    --accent-hover: #008f70;
    --accent-hot: #ff6f61;
    --danger: #e0524f;
    --bubble-mine: #cdeee5;
    --bubble-other: #ffffff;
    --bubble-other-border: #ded4c4;
    --chat-bg: rgba(255,250,242,0.92);
    --composer-bg: rgba(246,241,232,0.82);
    --tick: #82958f;
    --tick-read: #00a884;
    --overlay: rgba(0,0,0,0.3);
    --shadow-soft: 0 18px 45px rgba(80,67,48,0.18);
  }
  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    margin: 0;
    height: 100vh;
    background:
      radial-gradient(circle at 18% 10%, rgba(85,245,200,0.10), transparent 32%),
      radial-gradient(circle at 88% 14%, rgba(255,111,97,0.10), transparent 30%),
      var(--bg-main);
    color: var(--text-main);
    overflow: hidden;
  }
  html { height: 100%; overflow: hidden; }

  /* --- Avatars --- */
  .avatar {
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    flex-shrink: 0;
    user-select: none;
    position: relative;
  }
  .onlineDot {
    position: absolute;
    bottom: -1px;
    right: -1px;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #4caf50;
    border: 2px solid var(--bg-panel);
    display: none;
  }
  .avatarWrap.online .onlineDot { display: block; }
  .chatHeaderStatus {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-dim);
  }
  .chatHeaderStatus.online { color: #4caf50; }
  .chatHeaderStatus.typing { color: var(--accent); }
  .preview.typing { color: var(--accent); font-style: italic; }

  /* --- Auth screen --- */
  #auth {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #authBox {
    background: var(--bg-panel);
    padding: 32px;
    border: 1px solid var(--border-color);
    border-radius: 24px;
    width: 330px;
    text-align: center;
    box-shadow: var(--shadow-soft);
  }
  #authBox h2 { margin-top: 0; color: var(--text-bright); }
  #authBox input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 14px;
    border: 1px solid var(--border-color);
    background: var(--bg-main);
    color: var(--text-bright);
    font-size: 15px;
  }
  #authBox button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 14px;
    background: var(--accent);
    color: #101513;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
  }
  #authBox button:hover { background: var(--accent-hover); }
  #toggleAuth {
    margin-top: 14px;
    color: var(--accent);
    cursor: pointer;
    font-size: 14px;
  }
  #authError { color: var(--danger); min-height: 18px; font-size: 13px; }

  /* --- App layout --- */
  #app {
    display: none;
    height: 100vh;
    padding: 18px;
    gap: 0;
    min-height: 0;
    overflow: hidden;
  }
  #app.show { display: flex; }

  #sidebar {
    width: 348px;
    background: var(--bg-panel);
    border: 1px solid var(--border-color);
    border-right: none;
    border-radius: 24px 0 0 24px;
    box-shadow: var(--shadow-soft);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  #sidebarHeader {
    padding: 18px 18px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border-color);
  }
  #sidebarHeader .myInfo { display: flex; align-items: center; gap: 10px; min-width: 0; }
  #sidebarHeader b { color: var(--text-bright); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #sidebarHeader > div { display: flex; gap: 8px; flex-shrink: 0; }
  .brandMark {
    width: 38px;
    height: 38px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-hot));
    color: #101513;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 22px;
    flex-shrink: 0;
  }
  .brandBlock {
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .brandName {
    color: var(--text-bright);
    font-size: 20px;
    line-height: 1.05;
    font-weight: 850;
  }
  .brandUser {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #settingsBtn,
  #profileBtn {
    background: var(--bg-input);
    border: none;
    color: var(--text-bright);
    border-radius: 12px;
    width: 34px;
    height: 34px;
    font-size: 15px;
    cursor: pointer;
  }
  #settingsBtn:hover,
  #profileBtn:hover { background: var(--bg-hover); }
  #logoutBtn {
    background: var(--bg-input);
    border: none;
    color: var(--text-bright);
    border-radius: 12px;
    width: 34px;
    height: 34px;
    font-size: 15px;
    cursor: pointer;
  }
  #logoutBtn:hover { background: var(--danger); }
  #newChatBtn {
    background: var(--accent);
    border: none;
    color: #101513;
    border-radius: 12px;
    width: 34px;
    height: 34px;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
  }
  #chatList { flex: 1; overflow-y: auto; }
  .chatItem {
    margin: 8px 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    border: 1px solid transparent;
    border-radius: 18px;
  }
  .chatItem:hover { background: var(--bg-hover); }
  .chatItem.active {
    background: var(--bg-active);
    border-color: rgba(85,245,200,0.24);
    box-shadow: inset 4px 0 0 var(--accent);
  }
  .chatItem .chatItemBody { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .chatItem .name { color: var(--text-bright); font-weight: 600; }
  .chatItem .preview {
    color: var(--text-dim);
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #emptyList { padding: 20px; color: var(--text-dim); text-align: center; font-size: 14px; }

  .chatItem { position: relative; }
  .chatItem .meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .unreadBadge {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
  }
  .chatItem.hasUnread .name { color: var(--text-bright); }
  .chatItem.hasUnread .preview { color: var(--text-dim-2); }

  .tick {
    font-size: 12px;
    margin-left: 4px;
    color: var(--tick);
  }
  .tick.read { color: var(--tick-read); }

  #chatPanel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    background: var(--chat-bg);
    border: 1px solid var(--border-color);
    border-radius: 0 24px 24px 0;
    box-shadow: var(--shadow-soft);
    overflow: hidden;
  }
  #activeChat {
    flex: 1;
    min-height: 0;
    flex-direction: column;
  }
  #chatHeader {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-color-2);
    color: var(--text-bright);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #noChatSelected {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
  }
  #messages {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 24px 26px;
    list-style: none;
    margin: 0;
  }
  #messages li {
    max-width: 60%;
    overflow-wrap: anywhere;
    padding: 11px 14px;
    margin-bottom: 10px;
    border-radius: 18px;
    background: var(--bubble-other);
    color: var(--text-main);
    width: fit-content;
    position: relative;
    border: 1px solid var(--bubble-other-border);
    box-shadow: 0 8px 22px rgba(0,0,0,0.08);
  }
  #messages li.mine {
    background: var(--bubble-mine);
    margin-left: auto;
    border-color: rgba(85,245,200,0.18);
    box-shadow: inset 4px 0 0 var(--accent);
  }
  body.light #messages li:not(.mine) {
    box-shadow: 0 10px 26px rgba(83,70,48,0.13);
  }
  #messages li .who {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 2px;
  }
  #messages li.deleted {
    font-style: italic;
    color: var(--text-dim);
  }
  .editedTag {
    font-size: 11px;
    color: var(--tick);
    margin-left: 6px;
  }
  .msgActions {
    display: none;
    position: absolute;
    top: -14px;
    right: 4px;
    gap: 4px;
    background: var(--bg-main);
    border-radius: 8px;
    padding: 2px 4px;
  }
  #messages li.mine:not(.deleted):hover .msgActions { display: flex; }
  .msgActions span {
    cursor: pointer;
    font-size: 13px;
    padding: 2px 4px;
  }
  .msgActions span:hover { opacity: 0.7; }
  .msgText { white-space: pre-wrap; word-break: break-word; }
  .editInput {
    width: 100%;
    min-width: 180px;
    padding: 6px 8px;
    border-radius: 6px;
    border: none;
    background: var(--bg-main);
    color: var(--text-bright);
    font-size: 14px;
    font-family: inherit;
  }
  .editRow { display: flex; gap: 6px; margin-top: 6px; }
  .editRow button {
    border: none;
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  .editSave { background: var(--accent); color: #fff; }
  .editCancel { background: var(--bg-input); color: var(--text-bright); }
  #form {
    flex-shrink: 0;
    display: flex;
    padding: 14px 18px 18px;
    border-top: 1px solid var(--border-color-2);
    background: var(--composer-bg);
  }
  #input {
    flex: 1;
    padding: 12px;
    border-radius: 16px;
    border: 1px solid var(--border-color);
    background: var(--bg-input);
    color: var(--text-bright);
    font-size: 15px;
  }
  #form button {
    margin-left: 10px;
    width: 48px;
    padding: 0;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent-hot));
    color: #101513;
    font-weight: 900;
    cursor: pointer;
  }
  #voiceBtn {
    margin-left: 0;
    margin-right: 8px;
    width: 44px;
    background: var(--bg-input);
    color: var(--text-bright);
    border: 1px solid var(--border-color);
    font-size: 18px;
    flex-shrink: 0;
  }
  #voiceBtn:hover { background: var(--bg-hover); }
  #voiceBtn.recording {
    background: var(--accent-hot);
    color: #fff;
    border-color: var(--accent-hot);
    animation: pulseRec 1s ease-in-out infinite;
  }
  @keyframes pulseRec {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  #recordingBar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 18px 0;
    color: var(--accent-hot);
    font-size: 13px;
    font-weight: 600;
  }
  #recordingBar.show { display: flex; }
  #recordingBar .recDot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent-hot);
    animation: pulseRec 1s ease-in-out infinite;
  }
  .voiceMsg {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 200px;
  }
  .voiceMsg audio {
    flex: 1;
    height: 36px;
    min-width: 160px;
    max-width: 280px;
  }
  .voiceDuration {
    font-size: 12px;
    color: var(--text-dim-2);
    white-space: nowrap;
  }

  #toastContainer {
    position: fixed;
    right: 18px;
    bottom: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 20;
    pointer-events: none;
  }
  .toast {
    width: min(320px, calc(100vw - 36px));
    background: var(--bg-panel);
    border: 1px solid var(--border-color-2);
    border-radius: 8px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.28);
    color: var(--text-main);
    padding: 12px 14px;
    cursor: pointer;
    pointer-events: auto;
  }
  .toast strong {
    display: block;
    color: var(--text-bright);
    margin-bottom: 4px;
  }
  .toast span {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text-dim-2);
    font-size: 13px;
  }

  /* --- Modals --- */
  #modalOverlay,
  #settingsOverlay,
  #profileOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay);
    align-items: center;
    justify-content: center;
    z-index: 30;
  }
  #modalOverlay.show,
  #settingsOverlay.show,
  #profileOverlay.show { display: flex; }
  #modalBox,
  .settingsBox {
    background: var(--bg-panel);
    padding: 24px;
    border-radius: 12px;
    width: min(360px, calc(100vw - 36px));
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-soft);
  }
  #modalBox h3,
  .settingsBox h3 { margin-top: 0; color: var(--text-bright); }
  #modalBox input,
  .settingsBox input,
  .settingsBox textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
    background: var(--bg-main);
    color: var(--text-bright);
    font: inherit;
  }
  .settingsBox textarea {
    resize: vertical;
    min-height: 78px;
  }
  #modalBox .row,
  .settingsRow { display: flex; gap: 10px; margin-top: 14px; }
  #modalBox button,
  .settingsBox button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  .settingsOption {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-main);
  }
  .settingsOption:last-of-type { border-bottom: none; }
  .segmented {
    display: flex;
    background: var(--bg-input);
    border-radius: 10px;
    padding: 3px;
  }
  .segmented button {
    min-width: 68px;
    padding: 7px 10px;
    color: var(--text-main);
    background: transparent;
  }
  .segmented button.active {
    background: var(--accent);
    color: #101513;
    font-weight: 800;
  }
  .profilePreview {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    color: var(--text-main);
  }
  .profilePreview .avatar { width: 48px; height: 48px; font-size: 20px; }
  .colorSwatches {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-top: 8px;
  }
  .colorSwatch {
    flex: initial;
    height: 30px;
    padding: 0;
    border-radius: 10px;
    border: 2px solid transparent;
    cursor: pointer;
  }
  .colorSwatch.active {
    border-color: var(--text-bright);
    box-shadow: 0 0 0 2px var(--accent);
  }
  #modalCancel { background: var(--bg-input); color: var(--text-bright); }
  #modalStart,
  #settingsSave,
  #profileSave { background: var(--accent); color: #101513; font-weight: 800; }
  #settingsClose,
  #profileCancel { background: var(--bg-input); color: var(--text-bright); }
  #modalError { color: var(--danger); font-size: 13px; min-height: 16px; }
</style>
</head>
<body>

<div id="auth">
  <div id="authBox">
    <h2 id="authTitle">Spark</h2>
    <input id="usernameInput" placeholder="Юзернейм (напр. zahar146)" autocomplete="username" />
    <input id="passwordInput" type="password" placeholder="Пароль" autocomplete="current-password" />
    <button id="authSubmit">Увійти</button>
    <p id="authError"></p>
    <div id="toggleAuth">Немає акаунта? Зареєструватись</div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div id="sidebarHeader">
      <div class="myInfo">
        <span class="brandMark">S</span>
        <span class="brandBlock">
          <span class="brandName">Spark</span>
          <span id="myName" class="brandUser"></span>
        </span>
        <div id="myAvatar" class="avatar" style="display:none;"></div>
      </div>
      <div>
        <button id="newChatBtn" title="Новий чат">+</button>
        <button id="settingsBtn" title="Налаштування">⚙</button>
        <button id="profileBtn" title="Профіль">◉</button>
        <button id="logoutBtn" title="Вийти">⏻</button>
      </div>
    </div>
    <div id="chatList"></div>
  </div>

  <div id="chatPanel">
    <div id="noChatSelected">Виберіть чат зліва або почніть новий</div>
    <div id="activeChat" style="display:none;">
      <div id="chatHeader">
        <span id="chatHeaderAvatarWrap" class="avatarWrap" style="position:relative;display:inline-block;">
          <div id="chatHeaderAvatar" class="avatar" style="width:34px;height:34px;font-size:14px;"></div>
          <span class="onlineDot"></span>
        </span>
        <div style="display:flex;flex-direction:column;">
          <span id="chatHeaderName"></span>
          <span id="chatHeaderStatus" class="chatHeaderStatus"></span>
        </div>
      </div>
      <ul id="messages"></ul>
      <div id="recordingBar"><span class="recDot"></span><span id="recordingLabel">Запис... 0:00</span></div>
      <form id="form">
        <button type="button" id="voiceBtn" title="Утримуй для запису">🎤</button>
        <input id="input" autocomplete="off" placeholder="Напиши повідомлення..." />
        <button type="submit">➤</button>
      </form>
    </div>
  </div>
</div>

<div id="modalOverlay">
  <div id="modalBox">
    <h3>Новий чат</h3>
    <input id="partnerInput" placeholder="@юзернейм співрозмовника" />
    <p id="modalError"></p>
    <div class="row">
      <button id="modalCancel">Скасувати</button>
      <button id="modalStart">Почати</button>
    </div>
  </div>
</div>

<div id="settingsOverlay">
  <div class="settingsBox">
    <h3>Налаштування</h3>
    <div class="settingsOption">
      <span>Тема</span>
      <div class="segmented" id="themeSegment">
        <button type="button" data-theme-choice="dark">Темна</button>
        <button type="button" data-theme-choice="light">Світла</button>
      </div>
    </div>
    <div class="settingsOption">
      <span>Сповіщення браузера</span>
      <button type="button" id="notificationBtn">Увімкнути</button>
    </div>
    <div class="settingsRow">
      <button type="button" id="settingsClose">Закрити</button>
    </div>
  </div>
</div>

<div id="profileOverlay">
  <div class="settingsBox">
    <h3>Профіль</h3>
    <div class="profilePreview">
      <div id="profilePreviewAvatar" class="avatar"></div>
      <div>
        <strong id="profilePreviewName"></strong>
        <div id="profilePreviewBio" class="brandUser"></div>
      </div>
    </div>
    <label>
      Підпис
      <textarea id="profileBioInput" maxlength="80" placeholder="Наприклад: на зв'язку"></textarea>
    </label>
    <label style="display:block;margin-top:14px;">
      Колір аватарки
      <div id="profileColorSwatches" class="colorSwatches"></div>
    </label>
    <div class="settingsRow">
      <button type="button" id="profileCancel">Скасувати</button>
      <button type="button" id="profileSave">Зберегти</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myUsername = '';
  let currentRoom = '';
  let currentPartner = '';
  let isRegisterMode = false;
  let authToken = localStorage.getItem('authToken') || '';

  // --- Аватарки: кольоровий кружок з першою літерою юзернейму ---
  const AVATAR_COLORS = ['#e57373', '#f06292', '#ba68c8', '#9575cd', '#7986cb', '#64b5f6', '#4fc3f7', '#4dd0e1', '#4db6ac', '#81c784', '#aed581', '#ffb74d', '#ff8a65', '#a1887f'];

  function avatarColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
  }

  function fillAvatar(el, name) {
    if (!name) { el.textContent = '?'; el.style.background = '#555'; return; }
    el.textContent = name.charAt(0).toUpperCase();
    el.style.background = avatarColor(name.toLowerCase());
  }

  // --- Тема: темна/світла, зберігається в localStorage ---
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsOverlay = document.getElementById('settingsOverlay');
  const themeSegment = document.getElementById('themeSegment');
  const notificationBtn = document.getElementById('notificationBtn');
  function applyTheme(theme) {
    document.body.classList.toggle('light', theme === 'light');
    settingsBtn.textContent = '⚙';
    document.querySelectorAll('[data-theme-choice]').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.themeChoice === theme);
    });
  }
  let currentTheme = localStorage.getItem('theme') || 'dark';
  applyTheme(currentTheme);
  settingsBtn.addEventListener('click', () => {
    settingsOverlay.classList.add('show');
  });
  document.getElementById('settingsClose').addEventListener('click', () => {
    settingsOverlay.classList.remove('show');
  });
  settingsOverlay.addEventListener('click', (e) => {
    if (e.target === settingsOverlay) settingsOverlay.classList.remove('show');
  });
  themeSegment.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-theme-choice]');
    if (!btn) return;
    currentTheme = btn.dataset.themeChoice;
    localStorage.setItem('theme', currentTheme);
    applyTheme(currentTheme);
  });
  notificationBtn.addEventListener('click', requestNotificationPermission);

  // --- Профіль: локальні налаштування поточного пристрою ---
  const profileBtn = document.getElementById('profileBtn');
  const profileOverlay = document.getElementById('profileOverlay');
  const profileBioInput = document.getElementById('profileBioInput');
  const profilePreviewAvatar = document.getElementById('profilePreviewAvatar');
  const profilePreviewName = document.getElementById('profilePreviewName');
  const profilePreviewBio = document.getElementById('profilePreviewBio');
  const profileColorSwatches = document.getElementById('profileColorSwatches');
  let currentProfile = { bio: '', avatarColor: '' };
  let selectedProfileColor = '';

  function profileKey(username) {
    return `sparkProfile:${(username || '').toLowerCase()}`;
  }

  function loadProfile(username) {
    try {
      return JSON.parse(localStorage.getItem(profileKey(username))) || { bio: '', avatarColor: '' };
    } catch (_err) {
      return { bio: '', avatarColor: '' };
    }
  }

  function saveProfile(username, profile) {
    localStorage.setItem(profileKey(username), JSON.stringify(profile));
  }

  function applyProfile() {
    const brandMark = document.querySelector('.brandMark');
    const color = currentProfile.avatarColor || avatarColor(myUsername || 'spark');
    brandMark.textContent = (myUsername || 'S').charAt(0).toUpperCase();
    brandMark.style.background = color;
    document.getElementById('myName').textContent = currentProfile.bio
      ? `@${myUsername} · ${currentProfile.bio}`
      : `@${myUsername}`;
  }

  function renderProfileSwatches() {
    profileColorSwatches.innerHTML = '';
    AVATAR_COLORS.forEach((color) => {
      const swatch = document.createElement('button');
      swatch.type = 'button';
      swatch.className = 'colorSwatch' + (color === selectedProfileColor ? ' active' : '');
      swatch.style.background = color;
      swatch.title = color;
      swatch.addEventListener('click', () => {
        selectedProfileColor = color;
        renderProfileSwatches();
        profilePreviewAvatar.style.background = color;
      });
      profileColorSwatches.appendChild(swatch);
    });
  }

  function openProfileSettings() {
    selectedProfileColor = currentProfile.avatarColor || avatarColor(myUsername || 'spark');
    profileBioInput.value = currentProfile.bio || '';
    profilePreviewName.textContent = '@' + myUsername;
    profilePreviewBio.textContent = profileBioInput.value || 'Без підпису';
    profilePreviewAvatar.textContent = (myUsername || '?').charAt(0).toUpperCase();
    profilePreviewAvatar.style.background = selectedProfileColor;
    renderProfileSwatches();
    profileOverlay.classList.add('show');
  }

  profileBtn.addEventListener('click', openProfileSettings);
  profileBioInput.addEventListener('input', () => {
    profilePreviewBio.textContent = profileBioInput.value.trim() || 'Без підпису';
  });
  document.getElementById('profileCancel').addEventListener('click', () => {
    profileOverlay.classList.remove('show');
  });
  profileOverlay.addEventListener('click', (e) => {
    if (e.target === profileOverlay) profileOverlay.classList.remove('show');
  });
  document.getElementById('profileSave').addEventListener('click', () => {
    currentProfile = {
      bio: profileBioInput.value.trim().slice(0, 80),
      avatarColor: selectedProfileColor,
    };
    saveProfile(myUsername, currentProfile);
    applyProfile();
    profileOverlay.classList.remove('show');
  });

  // --- Онлайн-статус та "друкує..." ---
  let onlineSet = new Set();
  let typingState = {}; // room -> username, хто зараз друкує в цій кімнаті
  let chatsCache = [];
  const baseTitle = document.title;
  let unreadTitleCount = 0;

  function requestNotificationPermission() {
    if (!('Notification' in window) || Notification.permission !== 'default') return;
    Notification.requestPermission().catch(() => {});
  }

  function resetPageTitle() {
    unreadTitleCount = 0;
    document.title = baseTitle;
  }

  function showToastNotification(data) {
    const toastContainer = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `
      <strong>@${escapeHtml(data.from)} написав</strong>
      <span>${escapeHtml(data.text)}</span>
    `;
    toast.addEventListener('click', () => {
      openChat(data.room, data.from);
      toast.remove();
      resetPageTitle();
      window.focus();
    });
    toastContainer.appendChild(toast);
    setTimeout(() => toast.remove(), 6000);
  }

  function showBrowserNotification(data) {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    if (!document.hidden) return;

    const notification = new Notification(`@${data.from} написав`, {
      body: data.text,
      tag: data.room,
    });
    notification.onclick = () => {
      window.focus();
      openChat(data.room, data.from);
      resetPageTitle();
      notification.close();
    };
  }

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) resetPageTitle();
  });

  // Якщо є збережений токен — пробуємо автоматично залогінитись
  socket.on('connect', () => {
    if (authToken) {
      socket.emit('auto login', authToken, (res) => {
        if (res.success) {
          enterApp(res.username);
        } else {
          localStorage.removeItem('authToken');
          authToken = '';
        }
      });
    }
  });

  // --- Auth elements ---
  const authDiv = document.getElementById('auth');
  const appDiv = document.getElementById('app');
  const usernameInput = document.getElementById('usernameInput');
  const passwordInput = document.getElementById('passwordInput');
  const authSubmit = document.getElementById('authSubmit');
  const authError = document.getElementById('authError');
  const authTitle = document.getElementById('authTitle');
  const toggleAuth = document.getElementById('toggleAuth');

  toggleAuth.addEventListener('click', () => {
    isRegisterMode = !isRegisterMode;
    authTitle.textContent = isRegisterMode ? 'Реєстрація' : 'Вхід';
    authSubmit.textContent = isRegisterMode ? 'Зареєструватись' : 'Увійти';
    toggleAuth.textContent = isRegisterMode ? 'Вже є акаунт? Увійти' : "Немає акаунта? Зареєструватись";
    authError.textContent = '';
  });

  authSubmit.addEventListener('click', () => {
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();
    if (!username || !password) {
      authError.textContent = 'Заповни всі поля';
      return;
    }

    const event = isRegisterMode ? 'register' : 'login';
    socket.emit(event, { username, password }, (res) => {
      if (!res.success) {
        authError.textContent = res.error || 'Помилка';
        return;
      }
      if (isRegisterMode) {
        // Після реєстрації одразу логінимось
        socket.emit('login', { username, password }, (loginRes) => {
          if (loginRes.success) {
            authToken = loginRes.token;
            localStorage.setItem('authToken', authToken);
            enterApp(loginRes.username);
          }
        });
      } else {
        authToken = res.token;
        localStorage.setItem('authToken', authToken);
        enterApp(res.username);
      }
    });
  });

  function enterApp(username) {
    myUsername = username;
    requestNotificationPermission();
    currentProfile = loadProfile(username);
    applyProfile();
    fillAvatar(document.getElementById('myAvatar'), username);
    authDiv.style.display = 'none';
    appDiv.classList.add('show');
    socket.emit('get online users', null, (list) => {
      onlineSet = new Set((list || []).map((u) => u.toLowerCase()));
      loadChats();
    });
  }

  document.getElementById('logoutBtn').addEventListener('click', () => {
    socket.emit('logout', authToken);
    localStorage.removeItem('authToken');
    authToken = '';
    myUsername = '';
    currentProfile = { bio: '', avatarColor: '' };
    currentRoom = '';
    appDiv.classList.remove('show');
    authDiv.style.display = 'flex';
    usernameInput.value = '';
    passwordInput.value = '';
  });

  // --- Chat list ---
  const chatListDiv = document.getElementById('chatList');

  function loadChats() {
    socket.emit('get chats', null, (chats) => {
      chatsCache = chats;
      renderChatList();
    });
  }

  function renderChatList() {
    chatListDiv.innerHTML = '';
    if (chatsCache.length === 0) {
      chatListDiv.innerHTML = '<div id="emptyList">Поки немає чатів. Натисни "+", щоб почати.</div>';
      return;
    }
    chatsCache.forEach((chat) => {
      const div = document.createElement('div');
      div.className = 'chatItem' + (chat.unread > 0 ? ' hasUnread' : '');
      div.dataset.room = chat.room;
      const isTyping = typingState[chat.room];
      const prefix = chat.lastUser === myUsername ? 'Ви: ' : '';
      const badge = chat.unread > 0 ? `<span class="unreadBadge">${chat.unread > 99 ? '99+' : chat.unread}</span>` : '';

      const avatarWrap = document.createElement('span');
      avatarWrap.className = 'avatarWrap' + (onlineSet.has(chat.partner.toLowerCase()) ? ' online' : '');
      avatarWrap.style.cssText = 'position:relative;display:inline-block;';
      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'avatar';
      avatarDiv.style.cssText = 'width:44px;height:44px;font-size:17px;';
      fillAvatar(avatarDiv, chat.partner);
      const dot = document.createElement('span');
      dot.className = 'onlineDot';
      avatarWrap.appendChild(avatarDiv);
      avatarWrap.appendChild(dot);
      div.appendChild(avatarWrap);

      const body = document.createElement('div');
      body.className = 'chatItemBody';
      const previewHtml = isTyping
        ? `<span class="preview typing">друкує...</span>`
        : `<span class="preview">${prefix}${escapeHtml(chat.lastText)}</span>`;
      body.innerHTML = `
        <div class="meta">
          <span class="name">@${escapeHtml(chat.partner)}</span>
          ${badge}
        </div>
        ${previewHtml}
      `;
      div.appendChild(body);
      div.addEventListener('click', () => openChat(chat.room, chat.partner));
      if (chat.room === currentRoom) div.classList.add('active');
      chatListDiv.appendChild(div);
    });
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function formatDuration(seconds) {
    const total = Math.max(0, Math.round(Number(seconds) || 0));
    const m = Math.floor(total / 60);
    const s = total % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  // --- New chat modal ---
  const modalOverlay = document.getElementById('modalOverlay');
  const partnerInput = document.getElementById('partnerInput');
  const modalError = document.getElementById('modalError');

  document.getElementById('newChatBtn').addEventListener('click', () => {
    modalOverlay.classList.add('show');
    partnerInput.value = '';
    modalError.textContent = '';
    partnerInput.focus();
  });

  document.getElementById('modalCancel').addEventListener('click', () => {
    modalOverlay.classList.remove('show');
  });

  document.getElementById('modalStart').addEventListener('click', () => {
    const partnerUsername = partnerInput.value.trim();
    socket.emit('start chat', { partnerUsername }, (res) => {
      if (!res.success) {
        modalError.textContent = res.error;
        return;
      }
      modalOverlay.classList.remove('show');
      openChat(res.room, res.partner);
    });
  });

  // --- Active chat ---
  const noChatSelected = document.getElementById('noChatSelected');
  const activeChat = document.getElementById('activeChat');
  const chatHeaderName = document.getElementById('chatHeaderName');
  const chatHeaderAvatar = document.getElementById('chatHeaderAvatar');
  const chatHeaderAvatarWrap = document.getElementById('chatHeaderAvatarWrap');
  const chatHeaderStatus = document.getElementById('chatHeaderStatus');
  const messages = document.getElementById('messages');
  const form = document.getElementById('form');
  const input = document.getElementById('input');

  function updateChatHeaderStatus() {
    if (!currentPartner) return;
    const isTyping = typingState[currentRoom];
    const isOnline = onlineSet.has(currentPartner.toLowerCase());
    chatHeaderAvatarWrap.classList.toggle('online', isOnline);
    if (isTyping) {
      chatHeaderStatus.textContent = 'друкує...';
      chatHeaderStatus.className = 'chatHeaderStatus typing';
    } else if (isOnline) {
      chatHeaderStatus.textContent = 'онлайн';
      chatHeaderStatus.className = 'chatHeaderStatus online';
    } else {
      chatHeaderStatus.textContent = 'офлайн';
      chatHeaderStatus.className = 'chatHeaderStatus';
    }
  }

  function openChat(room, partner) {
    currentRoom = room;
    currentPartner = partner;
    resetPageTitle();
    chatHeaderName.textContent = '@' + partner;
    fillAvatar(chatHeaderAvatar, partner);
    updateChatHeaderStatus();
    messages.innerHTML = '';
    noChatSelected.style.display = 'none';
    activeChat.style.display = 'flex';

    document.querySelectorAll('.chatItem').forEach((el) => {
      el.classList.toggle('active', el.dataset.room === room);
    });

    socket.emit('join room', room);
  }

  let typingTimeout = null;
  let isCurrentlyTyping = false;

  input.addEventListener('input', () => {
    if (!currentRoom) return;
    if (!isCurrentlyTyping) {
      isCurrentlyTyping = true;
      socket.emit('typing', { room: currentRoom });
    }
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      isCurrentlyTyping = false;
      socket.emit('stop typing', { room: currentRoom });
    }, 2000);
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    if (input.value.trim() && currentRoom) {
      socket.emit('chat message', { room: currentRoom, text: input.value.trim() });
      input.value = '';
      clearTimeout(typingTimeout);
      if (isCurrentlyTyping) {
        isCurrentlyTyping = false;
        socket.emit('stop typing', { room: currentRoom });
      }
    }
  });

  // --- Голосові повідомлення ---
  const voiceBtn = document.getElementById('voiceBtn');
  const recordingBar = document.getElementById('recordingBar');
  const recordingLabel = document.getElementById('recordingLabel');
  const MAX_VOICE_SECONDS = 120;
  let mediaRecorder = null;
  let voiceStream = null;
  let voiceChunks = [];
  let voiceStartedAt = 0;
  let voiceTimerId = null;
  let isRecordingVoice = false;
  let voiceSending = false;

  function pickVoiceMimeType() {
    const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
    return types.find((type) => MediaRecorder.isTypeSupported(type)) || '';
  }

  function updateRecordingLabel() {
    const elapsed = Math.floor((Date.now() - voiceStartedAt) / 1000);
    recordingLabel.textContent = 'Запис... ' + formatDuration(elapsed);
    if (elapsed >= MAX_VOICE_SECONDS) stopVoiceRecording(true);
  }

  async function startVoiceRecording() {
    if (!currentRoom || isRecordingVoice || voiceSending) return;
    if (!navigator.mediaDevices || !window.MediaRecorder) {
      alert('Браузер не підтримує запис голосу');
      return;
    }

    try {
      voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (_err) {
      alert('Немає доступу до мікрофона');
      return;
    }

    const mimeType = pickVoiceMimeType();
    voiceChunks = [];
    mediaRecorder = mimeType
      ? new MediaRecorder(voiceStream, { mimeType })
      : new MediaRecorder(voiceStream);

    mediaRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) voiceChunks.push(e.data);
    };

    mediaRecorder.start(250);
    isRecordingVoice = true;
    voiceStartedAt = Date.now();
    voiceBtn.classList.add('recording');
    recordingBar.classList.add('show');
    updateRecordingLabel();
    voiceTimerId = setInterval(updateRecordingLabel, 250);
  }

  function cleanupVoiceRecording() {
    clearInterval(voiceTimerId);
    voiceTimerId = null;
    isRecordingVoice = false;
    voiceBtn.classList.remove('recording');
    recordingBar.classList.remove('show');
    if (voiceStream) {
      voiceStream.getTracks().forEach((track) => track.stop());
      voiceStream = null;
    }
    mediaRecorder = null;
    voiceChunks = [];
  }

  async function sendVoiceBlob(blob, duration) {
    if (!blob || !currentRoom || voiceSending) return;
    voiceSending = true;
    voiceBtn.disabled = true;

    try {
      const formData = new FormData();
      formData.append('audio', blob, blob.type.includes('ogg') ? 'voice.ogg' : 'voice.webm');
      formData.append('token', authToken);
      formData.append('room', currentRoom);
      formData.append('duration', String(duration));

      const res = await fetch('/api/voice-message', { method: 'POST', body: formData });
      const data = await res.json();
      if (!data.success) {
        alert((data && data.error) || 'Не вдалось надіслати голосове');
      }
    } catch (_err) {
      alert('Помилка мережі під час надсилання голосового');
    } finally {
      voiceSending = false;
      voiceBtn.disabled = false;
    }
  }

  function stopVoiceRecording(shouldSend) {
    if (!isRecordingVoice || !mediaRecorder) return;
    isRecordingVoice = false;

    const recorder = mediaRecorder;
    const duration = Math.max(1, Math.round((Date.now() - voiceStartedAt) / 1000));
    const mimeType = recorder.mimeType || pickVoiceMimeType() || 'audio/webm';
    const send = shouldSend;

    recorder.onstop = async () => {
      const blob = new Blob(voiceChunks, { type: mimeType });
      cleanupVoiceRecording();
      if (send && blob.size > 0 && duration >= 1) {
        await sendVoiceBlob(blob, duration);
      }
    };

    if (recorder.state !== 'inactive') recorder.stop();
    else cleanupVoiceRecording();
  }

  function bindVoicePress(el) {
    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      startVoiceRecording();
    });
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      startVoiceRecording();
    }, { passive: false });
    el.addEventListener('mouseup', () => stopVoiceRecording(true));
    el.addEventListener('mouseleave', () => {
      if (isRecordingVoice) stopVoiceRecording(true);
    });
    el.addEventListener('touchend', (e) => {
      e.preventDefault();
      stopVoiceRecording(true);
    }, { passive: false });
    el.addEventListener('touchcancel', () => stopVoiceRecording(false));
  }

  bindVoicePress(voiceBtn);

  function renderMessage(data) {
    const li = document.createElement('li');
    li.className = data.user === myUsername ? 'mine' : '';
    if (data.type === 'voice') li.classList.add('voice');
    if (data.id) li.dataset.id = data.id;
    fillMessageContent(li, data);
    messages.appendChild(li);
    messages.scrollTop = messages.scrollHeight;
  }

  function fillMessageContent(li, data) {
    const isMine = data.user === myUsername;
    if (data.deleted) {
      li.classList.add('deleted');
      li.innerHTML = `<div class="who">${escapeHtml(data.user)}</div>Повідомлення видалено`;
      return;
    }
    li.classList.remove('deleted');
    li.dataset.text = data.text || '';
    const tick = isMine
      ? `<span class="tick ${data.read ? 'read' : ''}">${data.read ? '✓✓' : '✓'}</span>`
      : '';
    const editedTag = data.edited ? '<span class="editedTag">(ред.)</span>' : '';
    const isVoice = data.type === 'voice' && data.mediaUrl;
    const actions = isMine && !isVoice
      ? `<span class="msgActions"><span class="editBtn" title="Редагувати">✎</span><span class="delBtn" title="Видалити">🗑</span></span>`
      : (isMine ? `<span class="msgActions"><span class="delBtn" title="Видалити">🗑</span></span>` : '');

    let bodyHtml;
    if (isVoice) {
      bodyHtml = `
        <div class="voiceMsg">
          <audio controls preload="metadata" src="${escapeHtml(data.mediaUrl)}"></audio>
          <span class="voiceDuration">${formatDuration(data.duration)}</span>
        </div>`;
    } else {
      bodyHtml = `<span class="msgText">${escapeHtml(data.text)}</span>`;
    }

    li.innerHTML = `${actions}<div class="who">${escapeHtml(data.user)}</div>${bodyHtml}${editedTag}${tick}`;

    if (isMine) {
      const delBtn = li.querySelector('.delBtn');
      delBtn.addEventListener('click', () => deleteMessage(li, data));
      const editBtn = li.querySelector('.editBtn');
      if (editBtn) editBtn.addEventListener('click', () => startEdit(li, data));
    }
  }

  function startEdit(li, data) {
    const id = li.dataset.id;
    li.innerHTML = `
      <div class="who">${escapeHtml(data.user)}</div>
      <input class="editInput" value="${escapeHtml(li.dataset.text)}" />
      <div class="editRow">
        <button class="editSave">Зберегти</button>
        <button class="editCancel">Скасувати</button>
      </div>
    `;
    const editInput = li.querySelector('.editInput');
    editInput.focus();
    editInput.setSelectionRange(editInput.value.length, editInput.value.length);

    const cancel = () => fillMessageContent(li, data);
    li.querySelector('.editCancel').addEventListener('click', cancel);

    const save = () => {
      const newText = editInput.value.trim();
      if (!newText) return;
      socket.emit('edit message', { room: currentRoom, id, text: newText }, (res) => {
        if (!res || !res.success) {
          alert((res && res.error) || 'Не вдалось зберегти');
          fillMessageContent(li, data);
          return;
        }
        // Локальне оновлення відбудеться через подію 'message edited'
      });
    };
    li.querySelector('.editSave').addEventListener('click', save);
    editInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); save(); }
      if (e.key === 'Escape') cancel();
    });
  }

  function deleteMessage(li, data) {
    if (!confirm('Видалити це повідомлення?')) return;
    const id = li.dataset.id;
    socket.emit('delete message', { room: currentRoom, id }, (res) => {
      if (!res || !res.success) {
        alert((res && res.error) || 'Не вдалось видалити');
      }
      // Видалення UI відбудеться через подію 'message deleted'
    });
  }

  socket.on('new message notification', (data) => {
    if (!myUsername || data.from === myUsername) return;

    loadChats();
    const isOpenAndVisible = data.room === currentRoom && !document.hidden;
    if (isOpenAndVisible) return;

    unreadTitleCount += 1;
    document.title = `(${unreadTitleCount}) ${baseTitle}`;
    showToastNotification(data);
    showBrowserNotification(data);
  });

  socket.on('chat message', (data) => {
    renderMessage(data);
    loadChats();
  });

  socket.on('message edited', (data) => {
    if (data.room !== currentRoom) { loadChats(); return; }
    const li = messages.querySelector(`li[data-id="${data.id}"]`);
    if (li) {
      const isMine = li.classList.contains('mine');
      fillMessageContent(li, {
        user: isMine ? myUsername : currentPartner,
        text: data.text,
        type: data.type || 'text',
        mediaUrl: data.mediaUrl,
        duration: data.duration,
        edited: true,
        read: li.querySelector('.tick.read') !== null,
        deleted: false,
      });
    }
    loadChats();
  });

  socket.on('message deleted', (data) => {
    if (data.room !== currentRoom) { loadChats(); return; }
    const li = messages.querySelector(`li[data-id="${data.id}"]`);
    if (li) {
      const isMine = li.classList.contains('mine');
      fillMessageContent(li, { user: isMine ? myUsername : currentPartner, deleted: true });
    }
    loadChats();
  });

  // Співрозмовник прочитав наші повідомлення — оновлюємо галочки на ✓✓
  socket.on('messages read', (data) => {
    if (data.room !== currentRoom) return;
    (data.ids || []).forEach((id) => {
      const li = messages.querySelector(`li[data-id="${id}"]`);
      if (li) {
        const t = li.querySelector('.tick');
        if (t) {
          t.textContent = '✓✓';
          t.classList.add('read');
        }
      }
    });
    loadChats();
  });

  // --- Онлайн/офлайн статус співрозмовника ---
  socket.on('user status', (data) => {
    const key = (data.user || data.username || '').toLowerCase();
    if (!key) return;
    if (data.online) onlineSet.add(key);
    else onlineSet.delete(key);
    renderChatList();
    if (currentPartner && currentPartner.toLowerCase() === key) {
      updateChatHeaderStatus();
    }
  });

  // --- Хтось друкує ---
  socket.on('typing', (data) => {
    typingState[data.room] = data.user;
    renderChatList();
    if (data.room === currentRoom) updateChatHeaderStatus();
  });

  socket.on('stop typing', (data) => {
    delete typingState[data.room];
    renderChatList();
    if (data.room === currentRoom) updateChatHeaderStatus();
  });
</script>
</body>
</html>
