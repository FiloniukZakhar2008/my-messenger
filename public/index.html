<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spark</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --bg-main: #101513;
    --bg-panel: #171e23;
    --bg-input: #222b31;
    --bg-hover: #26352f;
    --bg-active: #263b35;
    --border-color: #253037;
    --border-color-2: #273239;
    --text-main: #d9e6e1;
    --text-bright: #f3fbf8;
    --text-dim: #8f9c99;
    --text-dim-2: #c4d3ce;
    --accent: #55f5c8;
    --accent-hover: #2bd9ac;
    --accent-hot: #ff6f61;
    --accent-rgb: 85, 245, 200;
    --accent-hot-rgb: 255, 111, 97;
    --danger: #ff6b6b;
    --bubble-mine: #245c51;
    --bubble-other: #263038;
    --bubble-other-border: rgba(255,255,255,0.08);
    --chat-bg: rgba(18,24,29,0.92);
    --composer-bg: rgba(17,22,27,0.62);
    --tick: #93b0a8;
    --tick-read: #55f5c8;
    --overlay: rgba(0,0,0,0.5);
    --shadow-soft: 0 18px 45px rgba(0,0,0,0.24);
  }
  body.light {
    --bg-main: #f6f1e8;
    --bg-panel: #fffaf2;
    --bg-input: #ece3d5;
    --bg-hover: #e2f1ec;
    --bg-active: #d8eee8;
    --border-color: #e0d7c8;
    --border-color-2: #e5dccc;
    --text-main: #26302e;
    --text-bright: #121816;
    --text-dim: #6b7a89;
    --text-dim-2: #44524f;
    --accent: #00a884;
    --accent-hover: #008f70;
    --accent-hot: #ff6f61;
    --accent-rgb: 0, 168, 132;
    --accent-hot-rgb: 255, 111, 97;
    --danger: #e0524f;
    --bubble-mine: #cdeee5;
    --bubble-other: #ffffff;
    --bubble-other-border: #ded4c4;
    --chat-bg: rgba(255,250,242,0.92);
    --composer-bg: rgba(246,241,232,0.82);
    --tick: #82958f;
    --tick-read: #00a884;
    --overlay: rgba(0,0,0,0.3);
    --shadow-soft: 0 18px 45px rgba(80,67,48,0.18);
  }

  /* --- Кольорові палітри (акцент кнопок/чеків/лого), накладаються поверх теми --- */
  body.palette-classic {
    --accent: #55f5c8;
    --accent-hover: #2bd9ac;
    --accent-hot: #ff6f61;
    --accent-rgb: 85, 245, 200;
    --accent-hot-rgb: 255, 111, 97;
    --tick-read: #55f5c8;
  }
  body.palette-ocean {
    --accent: #4fc3ff;
    --accent-hover: #2aa3e6;
    --accent-hot: #3a6dff;
    --accent-rgb: 79, 195, 255;
    --accent-hot-rgb: 58, 109, 255;
    --tick-read: #4fc3ff;
  }
  body.palette-violet {
    --accent: #a78bfa;
    --accent-hover: #8b5cf6;
    --accent-hot: #ec4899;
    --accent-rgb: 167, 139, 250;
    --accent-hot-rgb: 236, 72, 153;
    --tick-read: #a78bfa;
  }
  body.palette-sunset {
    --accent: #ffb454;
    --accent-hover: #ff9d2e;
    --accent-hot: #ff5277;
    --accent-rgb: 255, 180, 84;
    --accent-hot-rgb: 255, 82, 119;
    --tick-read: #ffb454;
  }
  body.palette-rose {
    --accent: #ff7aa8;
    --accent-hover: #ff4f8b;
    --accent-hot: #ffa45c;
    --accent-rgb: 255, 122, 168;
    --accent-hot-rgb: 255, 164, 92;
    --tick-read: #ff7aa8;
  }
  body.palette-gold {
    --accent: #e8c468;
    --accent-hover: #d4a93b;
    --accent-hot: #ff8a4c;
    --accent-rgb: 232, 196, 104;
    --accent-hot-rgb: 255, 138, 76;
    --tick-read: #e8c468;
  }
  body.palette-graphite {
    --accent: #9fb4c7;
    --accent-hover: #7e97ab;
    --accent-hot: #5c7a91;
    --accent-rgb: 159, 180, 199;
    --accent-hot-rgb: 92, 122, 145;
    --tick-read: #9fb4c7;
  }

  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    margin: 0;
    height: 100vh;
    background:
      radial-gradient(circle at 18% 10%, rgba(var(--accent-rgb),0.10), transparent 32%),
      radial-gradient(circle at 88% 14%, rgba(var(--accent-hot-rgb),0.10), transparent 30%),
      var(--bg-main);
    color: var(--text-main);
    overflow: hidden;
  }
  html { height: 100%; overflow: hidden; }

  /* --- Avatars --- */
  .avatar {
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    flex-shrink: 0;
    user-select: none;
    position: relative;
  }
  .onlineDot {
    position: absolute;
    bottom: -1px;
    right: -1px;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #4caf50;
    border: 2px solid var(--bg-panel);
    display: none;
  }
  .avatarWrap.online .onlineDot { display: block; }
  .chatHeaderStatus {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-dim);
  }
  .chatHeaderStatus.online { color: #4caf50; }
  .chatHeaderStatus.typing { color: var(--accent); }
  .preview.typing { color: var(--accent); font-style: italic; }

  /* --- Auth screen --- */
  #auth {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #authBox {
    background: var(--bg-panel);
    padding: 32px;
    border: 1px solid var(--border-color);
    border-radius: 24px;
    width: 330px;
    text-align: center;
    box-shadow: var(--shadow-soft);
  }
  #authBox h2 { margin-top: 0; color: var(--text-bright); }
  #authBox input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 14px;
    border: 1px solid var(--border-color);
    background: var(--bg-main);
    color: var(--text-bright);
    font-size: 15px;
  }
  #authBox button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 14px;
    background: var(--accent);
    color: #101513;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
  }
  #authBox button:hover { background: var(--accent-hover); }
  #toggleAuth {
    margin-top: 14px;
    color: var(--accent);
    cursor: pointer;
    font-size: 14px;
  }
  #authError { color: var(--danger); min-height: 18px; font-size: 13px; }

  /* --- App layout --- */
  #app {
    display: none;
    height: 100vh;
    padding: 18px;
    gap: 0;
    min-height: 0;
    overflow: hidden;
  }
  #app.show { display: flex; }

  #sidebar {
    width: 348px;
    background: var(--bg-panel);
    border: 1px solid var(--border-color);
    border-right: none;
    border-radius: 24px 0 0 24px;
    box-shadow: var(--shadow-soft);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  #sidebarHeader {
    padding: 18px 18px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border-color);
  }
  #sidebarHeader .myInfo { display: flex; align-items: center; gap: 10px; min-width: 0; }
  #sidebarHeader b { color: var(--text-bright); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #sidebarHeader > div { display: flex; gap: 8px; flex-shrink: 0; }
  .brandMark {
    width: 38px;
    height: 38px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-hot));
    color: #101513;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 22px;
    flex-shrink: 0;
  }
  .brandBlock {
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .brandName {
    color: var(--text-bright);
    font-size: 20px;
    line-height: 1.05;
    font-weight: 850;
  }
  .brandUser {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #settingsBtn,
  #profileBtn {
    background: var(--bg-input);
    border: none;
    color: var(--text-bright);
    border-radius: 12px;
    width: 34px;
    height: 34px;
    font-size: 15px;
    cursor: pointer;
  }
  #settingsBtn:hover,
  #profileBtn:hover { background: var(--bg-hover); }
  #logoutBtn {
    background: var(--bg-input);
    border: none;
    color: var(--text-bright);
    border-radius: 12px;
    width: 34px;
    height: 34px;
    font-size: 15px;
    cursor: pointer;
  }
  #logoutBtn:hover { background: var(--danger); }
  #newChatBtn {
    background: var(--accent);
    border: none;
    color: #101513;
    border-radius: 12px;
    width: 34px;
    height: 34px;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
  }
  #chatList { flex: 1; overflow-y: auto; }
  .chatItem {
    margin: 8px 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    border: 1px solid transparent;
    border-radius: 18px;
  }
  .chatItem:hover { background: var(--bg-hover); }
  .chatItem.active {
    background: var(--bg-active);
    border-color: rgba(var(--accent-rgb),0.24);
    box-shadow: inset 4px 0 0 var(--accent);
  }
  .chatItem .chatItemBody { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .chatItem .name { color: var(--text-bright); font-weight: 600; }
  .chatItem .preview {
    color: var(--text-dim);
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #emptyList { padding: 20px; color: var(--text-dim); text-align: center; font-size: 14px; }

  .chatItem { position: relative; }
  .chatItem .meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .unreadBadge {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
  }
  .chatItem.hasUnread .name { color: var(--text-bright); }
  .chatItem.hasUnread .preview { color: var(--text-dim-2); }

  .tick {
    font-size: 12px;
    margin-left: 4px;
    color: var(--tick);
  }
  .tick.read { color: var(--tick-read); }

  #chatPanel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    background: var(--chat-bg);
    border: 1px solid var(--border-color);
    border-radius: 0 24px 24px 0;
    box-shadow: var(--shadow-soft);
    overflow: hidden;
  }
  #activeChat {
    flex: 1;
    min-height: 0;
    flex-direction: column;
  }
  #chatHeader {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-color-2);
    color: var(--text-bright);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #noChatSelected {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
  }
  #messages {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 24px 26px;
    list-style: none;
    margin: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) transparent;
  }
  #messages::-webkit-scrollbar { width: 8px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb {
    background: var(--bubble-other-border);
    border-radius: 8px;
    transition: background 0.15s ease;
  }
  #messages:hover::-webkit-scrollbar-thumb { background: var(--accent); opacity: 0.6; }
  #messages::-webkit-scrollbar-thumb:hover { background: var(--accent-hover); }

  #chatList { scrollbar-width: thin; scrollbar-color: var(--bubble-other-border) transparent; }
  #chatList::-webkit-scrollbar { width: 7px; }
  #chatList::-webkit-scrollbar-track { background: transparent; }
  #chatList::-webkit-scrollbar-thumb { background: var(--bubble-other-border); border-radius: 8px; }
  #chatList::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ===== Шпалери чату ===== */
  #messages { background-color: transparent; background-position: center; }
  #messages.wallpaper-default { background: none; }
  #messages.wallpaper-midnight, .wallpaperSwatch.wallpaper-midnight { background: linear-gradient(160deg, #0f2027, #203a43, #2c5364); }
  #messages.wallpaper-sunset, .wallpaperSwatch.wallpaper-sunset { background: linear-gradient(160deg, #2d1b3d, #6a3b5c, #b8657a); }
  #messages.wallpaper-forest, .wallpaperSwatch.wallpaper-forest { background: linear-gradient(160deg, #0f1f17, #1f3a2c, #2f5742); }
  #messages.wallpaper-ocean, .wallpaperSwatch.wallpaper-ocean { background: linear-gradient(160deg, #03132e, #0a3d62, #2a82c4); }
  #messages.wallpaper-rose, .wallpaperSwatch.wallpaper-rose { background: linear-gradient(160deg, #2a0e1f, #5c1a3d, #b3486a); }
  #messages.wallpaper-sand, .wallpaperSwatch.wallpaper-sand { background: linear-gradient(160deg, #3a2c1d, #6b4f33, #c79a5e); }
  #messages.wallpaper-dots,
  .wallpaperSwatch.wallpaper-dots {
    background-color: var(--bg-main);
    background-image: radial-gradient(rgba(255,255,255,0.10) 1.5px, transparent 1.5px);
    background-size: 20px 20px;
  }
  #messages.wallpaper-grid,
  .wallpaperSwatch.wallpaper-grid {
    background-color: var(--bg-main);
    background-image:
      linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 26px 26px;
  }
  .wallpaperSwatch.wallpaper-default { background: var(--bg-input); }

  .wallpaperSwatches {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 10px;
  }
  .wallpaperSwatch {
    height: 52px;
    border-radius: 12px;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    position: relative;
    background-position: center;
    background-size: cover;
  }
  .wallpaperSwatch.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(var(--accent-rgb),0.25); }
  .wallpaperSwatch span {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    font-size: 10px;
    text-align: center;
    color: #fff;
    background: rgba(0,0,0,0.45);
    border-radius: 0 0 10px 10px;
    padding: 2px 0;
  }

  .paletteSwatches {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 10px;
  }
  .paletteSwatch {
    height: 44px;
    border-radius: 12px;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    position: relative;
  }
  .paletteSwatch.active {
    border-color: var(--text-bright);
    box-shadow: 0 0 0 2px var(--accent);
  }
  .paletteSwatch span {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    font-size: 10px;
    text-align: center;
    color: #fff;
    background: rgba(0,0,0,0.45);
    border-radius: 0 0 10px 10px;
    padding: 2px 0;
  }

  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  #messages li.bubbleIn { animation: bubbleIn 0.22s ease-out; }

  @keyframes sendPulse {
    0% { transform: scale(1); }
    40% { transform: scale(0.86); }
    100% { transform: scale(1); }
  }
  #form button.sending { animation: sendPulse 0.25s ease; }
  #messages li {
    max-width: 60%;
    overflow-wrap: anywhere;
    padding: 11px 14px;
    margin-bottom: 10px;
    border-radius: 18px;
    background: var(--bubble-other);
    color: var(--text-main);
    width: fit-content;
    position: relative;
    border: 1px solid var(--bubble-other-border);
    box-shadow: 0 8px 22px rgba(0,0,0,0.08);
    transition: box-shadow 0.15s ease;
  }
  #messages li.mine {
    background: var(--bubble-mine);
    margin-left: auto;
    border-color: rgba(var(--accent-rgb),0.18);
    box-shadow: inset 4px 0 0 var(--accent);
  }
  body.light #messages li:not(.mine) {
    box-shadow: 0 10px 26px rgba(83,70,48,0.13);
  }
  #messages li .who {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 2px;
  }
  #messages li.deleted {
    font-style: italic;
    color: var(--text-dim);
  }
  .msgFooter {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 5px;
    margin-top: 4px;
    height: 14px;
  }
  .editedTag {
    font-size: 11px;
    color: var(--tick);
    font-style: italic;
  }
  .msgTime {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .msgActions {
    display: none;
    position: absolute;
    top: -14px;
    right: 4px;
    gap: 4px;
    background: var(--bg-main);
    border-radius: 8px;
    padding: 2px 4px;
  }
  #messages li.mine:not(.deleted):hover .msgActions { display: flex; }
  .msgActions span {
    cursor: pointer;
    font-size: 13px;
    padding: 2px 4px;
  }
  .msgActions span:hover { opacity: 0.7; }
  .msgText { white-space: pre-wrap; word-break: break-word; }
  .editInput {
    width: 100%;
    min-width: 180px;
    padding: 6px 8px;
    border-radius: 6px;
    border: none;
    background: var(--bg-main);
    color: var(--text-bright);
    font-size: 14px;
    font-family: inherit;
  }
  .editRow { display: flex; gap: 6px; margin-top: 6px; }
  .editRow button {
    border: none;
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  .editSave { background: var(--accent); color: #fff; }
  .editCancel { background: var(--bg-input); color: var(--text-bright); }
  #form {
    flex-shrink: 0;
    display: flex;
    padding: 14px 18px 18px;
    border-top: 1px solid var(--border-color-2);
    background: var(--composer-bg);
  }
  #input {
    flex: 1;
    padding: 12px;
    border-radius: 16px;
    border: 1px solid var(--border-color);
    background: var(--bg-input);
    color: var(--text-bright);
    font-size: 15px;
  }
  #form button {
    margin-left: 10px;
    width: 48px;
    padding: 0;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent-hot));
    color: #101513;
    font-weight: 900;
    cursor: pointer;
  }
  #voiceBtn {
    margin-left: 0;
    margin-right: 8px;
    width: 44px;
    background: var(--bg-input);
    color: var(--text-bright);
    border: 1px solid var(--border-color);
    font-size: 18px;
    flex-shrink: 0;
  }
  #voiceBtn:hover { background: var(--bg-hover); }
  #voiceBtn.recording {
    background: var(--accent-hot);
    color: #fff;
    border-color: var(--accent-hot);
    animation: pulseRec 1s ease-in-out infinite;
  }
  @keyframes pulseRec {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  #recordingBar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 18px 0;
    color: var(--accent-hot);
    font-size: 13px;
    font-weight: 600;
  }
  #recordingBar.show { display: flex; }
  #recordingBar .recDot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent-hot);
    animation: pulseRec 1s ease-in-out infinite;
  }
  .voiceMsg {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 200px;
    max-width: 280px;
  }
  .voicePlayBtn {
    flex-shrink: 0;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent-hot));
    color: #101513;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.18);
    transition: transform 0.12s ease;
  }
  .voicePlayBtn:active { transform: scale(0.9); }
  .voiceMsg .voiceBody {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .voiceProgressBar {
    position: relative;
    height: 5px;
    border-radius: 4px;
    background: var(--bg-input);
    cursor: pointer;
    overflow: hidden;
  }
  .voiceProgressFill {
    position: absolute;
    inset: 0 auto 0 0;
    width: 0%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.08s linear;
  }
  .voiceProgressBar .voiceProgressKnob {
    position: absolute;
    top: 50%;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--bubble-other);
    transform: translate(-50%, -50%);
    left: 0%;
    transition: left 0.08s linear;
  }
  .voiceMeta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim-2);
  }
  .voiceMsg.playing .voicePlayBtn { animation: voicePulse 1.4s ease-in-out infinite; }
  @keyframes voicePulse {
    0%, 100% { box-shadow: 0 4px 10px rgba(0,0,0,0.18), 0 0 0 0 rgba(var(--accent-rgb),0.35); }
    50% { box-shadow: 0 4px 10px rgba(0,0,0,0.18), 0 0 0 6px rgba(var(--accent-rgb),0); }
  }

  #toastContainer {
    position: fixed;
    right: 18px;
    bottom: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 20;
    pointer-events: none;
  }
  .toast {
    width: min(320px, calc(100vw - 36px));
    background: var(--bg-panel);
    border: 1px solid var(--border-color-2);
    border-radius: 8px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.28);
    color: var(--text-main);
    padding: 12px 14px;
    cursor: pointer;
    pointer-events: auto;
  }
  .toast strong {
    display: block;
    color: var(--text-bright);
    margin-bottom: 4px;
  }
  .toast span {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text-dim-2);
    font-size: 13px;
  }

  /* --- Modals --- */
  #modalOverlay,
  #settingsOverlay,
  #profileOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay);
    align-items: center;
    justify-content: center;
    z-index: 30;
  }
  #modalOverlay.show,
  #settingsOverlay.show,
  #profileOverlay.show { display: flex; }
  #modalBox,
  .settingsBox {
    background: var(--bg-panel);
    padding: 24px;
    border-radius: 12px;
    width: min(360px, calc(100vw - 36px));
    max-height: min(560px, calc(100vh - 60px));
    overflow-y: auto;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-soft);
    scrollbar-width: thin;
    scrollbar-color: var(--bubble-other-border) transparent;
  }
  #modalBox::-webkit-scrollbar,
  .settingsBox::-webkit-scrollbar { width: 7px; }
  #modalBox::-webkit-scrollbar-track,
  .settingsBox::-webkit-scrollbar-track { background: transparent; }
  #modalBox::-webkit-scrollbar-thumb,
  .settingsBox::-webkit-scrollbar-thumb {
    background: var(--bubble-other-border);
    border-radius: 8px;
    transition: background 0.15s ease;
  }
  #modalBox::-webkit-scrollbar-thumb:hover,
  .settingsBox::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  #modalBox h3,
  .settingsBox h3 { margin-top: 0; color: var(--text-bright); }
  #modalBox input,
  .settingsBox input,
  .settingsBox textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
    background: var(--bg-main);
    color: var(--text-bright);
    font: inherit;
  }
  .settingsBox textarea {
    resize: vertical;
    min-height: 78px;
  }
  #modalBox .row,
  .settingsRow { display: flex; gap: 10px; margin-top: 14px; }
  #modalBox button,
  .settingsBox button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  .settingsOption {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-main);
  }
  .settingsOption:last-of-type { border-bottom: none; }
  .segmented {
    display: flex;
    background: var(--bg-input);
    border-radius: 10px;
    padding: 3px;
  }
  .segmented button {
    min-width: 68px;
    padding: 7px 10px;
    color: var(--text-main);
    background: transparent;
  }
  .segmented button.active {
    background: var(--accent);
    color: #101513;
    font-weight: 800;
  }
  .profilePreview {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    color: var(--text-main);
  }
  .profilePreview .avatar { width: 48px; height: 48px; font-size: 20px; }
  .colorSwatches {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-top: 8px;
  }
  .colorSwatch {
    flex: initial;
    height: 30px;
    padding: 0;
    border-radius: 10px;
    border: 2px solid transparent;
    cursor: pointer;
  }
  .colorSwatch.active {
    border-color: var(--text-bright);
    box-shadow: 0 0 0 2px var(--accent);
  }
  #modalCancel { background: var(--bg-input); color: var(--text-bright); }
  #modalStart,
  #settingsSave,
  #profileSave { background: var(--accent); color: #101513; font-weight: 800; }
  #settingsClose,
  #profileCancel { background: var(--bg-input); color: var(--text-bright); }
  #modalError { color: var(--danger); font-size: 13px; min-height: 16px; }
  .fieldHint { color: var(--text-dim); font-size: 12px; margin-top: 6px; }
  .modalErrorText { color: var(--danger); font-size: 13px; min-height: 16px; margin-top: 8px; }
  #backToListBtn {
    display: none;
    background: var(--bg-input);
    border: none;
    color: var(--text-bright);
    border-radius: 12px;
    width: 34px;
    height: 34px;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #backToListBtn:hover { background: var(--bg-hover); }

  /* ===== Мобільна адаптація ===== */
  @media (max-width: 768px) {
    body { font-size: 16px; } /* щоб iOS Safari не зумив інпути */

    #app {
      padding: 0;
      height: 100dvh;
    }

    #sidebar {
      width: 100%;
      border-radius: 0;
      border-right: 1px solid var(--border-color);
    }

    #chatPanel {
      border-radius: 0;
    }

    /* За замовчуванням на мобільному видно список чатів на весь екран,
       а чат-панель схована. Коли відкрито чат — навпаки. */
    #app:not(.chatOpen) #chatPanel { display: none; }
    #app.chatOpen #sidebar { display: none; }
    #app.chatOpen #chatPanel { display: flex; }

    #backToListBtn { display: flex; align-items: center; justify-content: center; }

    #sidebarHeader { padding: 14px 14px 12px; }
    .brandName { font-size: 18px; }

    #chatHeader { padding: 12px 14px; }

    #messages { padding: 14px 12px 18px; }
    #messages li { max-width: 82%; padding: 10px 12px; font-size: 15px; }

    #form { padding: 10px 10px 14px; }
    #input { font-size: 16px; padding: 11px 12px; } /* 16px запобігає авто-зуму на iOS */
    #voiceBtn, #form button { width: 42px; }

    .chatItem { margin: 6px 8px; padding: 10px 12px; }

    #modalBox,
    .settingsBox {
      width: calc(100vw - 32px);
      max-width: 360px;
    }

    #profileOverlay > div {
      width: calc(100vw - 32px);
      max-width: 360px;
    }
  }

  @media (max-width: 420px) {
    #messages li { max-width: 88%; }
  }
</style>
</head>
<body>

<div id="auth">
  <div id="authBox">
    <h2 id="authTitle">Spark</h2>
    <input id="usernameInput" placeholder="Юзернейм (напр. zahar146)" autocomplete="username" />
    <input id="passwordInput" type="password" placeholder="Пароль" autocomplete="current-password" />
    <button id="authSubmit">Увійти</button>
    <p id="authError"></p>
    <div id="toggleAuth">Немає акаунта? Зареєструватись</div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div id="sidebarHeader">
      <div class="myInfo">
        <span class="brandMark">S</span>
        <span class="brandBlock">
          <span class="brandName">Spark</span>
          <span id="myName" class="brandUser"></span>
        </span>
        <div id="myAvatar" class="avatar" style="display:none;"></div>
      </div>
      <div>
        <button id="newChatBtn" title="Новий чат">+</button>
        <button id="settingsBtn" title="Налаштування">⚙</button>
        <button id="profileBtn" title="Профіль">◉</button>
        <button id="logoutBtn" title="Вийти">⏻</button>
      </div>
    </div>
    <div id="chatList"></div>
  </div>

  <div id="chatPanel">
    <div id="noChatSelected">Виберіть чат зліва або почніть новий</div>
    <div id="activeChat" style="display:none;">
      <div id="chatHeader">
        <button type="button" id="backToListBtn" aria-label="Назад">←</button>
        <span id="chatHeaderAvatarWrap" class="avatarWrap" style="position:relative;display:inline-block;">
          <div id="chatHeaderAvatar" class="avatar" style="width:34px;height:34px;font-size:14px;"></div>
          <span class="onlineDot"></span>
        </span>
        <div style="display:flex;flex-direction:column;">
          <span id="chatHeaderName"></span>
          <span id="chatHeaderStatus" class="chatHeaderStatus"></span>
        </div>
      </div>
      <ul id="messages"></ul>
      <div id="recordingBar"><span class="recDot"></span><span id="recordingLabel">Запис... 0:00</span></div>
      <form id="form">
        <button type="button" id="voiceBtn" title="Утримуй для запису">🎤</button>
        <input id="input" autocomplete="off" placeholder="Напиши повідомлення..." />
        <button type="submit">➤</button>
      </form>
    </div>
  </div>
</div>

<div id="modalOverlay">
  <div id="modalBox">
    <h3>Новий чат</h3>
    <input id="partnerInput" placeholder="@юзернейм співрозмовника" />
    <p id="modalError"></p>
    <div class="row">
      <button id="modalCancel">Скасувати</button>
      <button id="modalStart">Почати</button>
    </div>
  </div>
</div>

<div id="settingsOverlay">
  <div class="settingsBox">
    <h3>Налаштування</h3>
    <div class="settingsOption">
      <span>Тема</span>
      <div class="segmented" id="themeSegment">
        <button type="button" data-theme-choice="dark">Темна</button>
        <button type="button" data-theme-choice="light">Світла</button>
      </div>
    </div>
    <div class="settingsOption" style="display:block;">
      <span>Кольорова палітра</span>
      <div id="paletteSwatches" class="paletteSwatches"></div>
    </div>
    <div class="settingsOption" style="display:block;">
      <span>Фон чату</span>
      <div id="wallpaperSwatches" class="wallpaperSwatches"></div>
    </div>
    <div class="settingsOption">
      <span>Сповіщення браузера</span>
      <button type="button" id="notificationBtn">Увімкнути</button>
    </div>
    <div class="settingsRow">
      <button type="button" id="settingsClose">Закрити</button>
    </div>
  </div>
</div>

<div id="profileOverlay">
  <div class="settingsBox">
    <h3>Профіль</h3>
    <div class="profilePreview">
      <div id="profilePreviewAvatar" class="avatar"></div>
      <div>
        <strong id="profilePreviewName"></strong>
        <div id="profilePreviewBio" class="brandUser"></div>
      </div>
    </div>
    <label>
      Підпис
      <textarea id="profileBioInput" maxlength="80" placeholder="Наприклад: на зв'язку"></textarea>
    </label>
    <div class="fieldHint">Підпис і колір аватарки бачать інші користувачі</div>
    <label style="display:block;margin-top:14px;">
      Колір аватарки
      <div id="profileColorSwatches" class="colorSwatches"></div>
    </label>
    <div id="profileError" class="modalErrorText"></div>
    <div class="settingsRow">
      <button type="button" id="profileCancel">Скасувати</button>
      <button type="button" id="profileSave">Зберегти</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myUsername = '';
  let currentRoom = '';
  let currentPartner = '';
  let isRegisterMode = false;
  let authToken = localStorage.getItem('authToken') || '';

  // --- Аватарки: кольоровий кружок з першою літерою юзернейму ---
  const AVATAR_COLORS = ['#e57373', '#f06292', '#ba68c8', '#9575cd', '#7986cb', '#64b5f6', '#4fc3f7', '#4dd0e1', '#4db6ac', '#81c784', '#aed581', '#ffb74d', '#ff8a65', '#a1887f'];

  function avatarColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
  }

  // --- Публічні профілі (підпис + колір аватарки) інших користувачів ---
  const profileCache = new Map(); // username (lowercase) -> { bio, avatarColor }

  function cacheProfile(username, bio, avatarColorValue) {
    if (!username) return;
    profileCache.set(username.toLowerCase(), { bio: bio || '', avatarColor: avatarColorValue || '' });
  }

  function getProfile(username) {
    return profileCache.get((username || '').toLowerCase()) || { bio: '', avatarColor: '' };
  }

  function fillAvatar(el, name) {
    if (!name) { el.textContent = '?'; el.style.background = '#555'; return; }
    el.textContent = name.charAt(0).toUpperCase();
    el.style.background = getProfile(name).avatarColor || avatarColor(name.toLowerCase());
  }

  // --- Тема: темна/світла, зберігається в localStorage ---
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsOverlay = document.getElementById('settingsOverlay');
  const themeSegment = document.getElementById('themeSegment');
  const notificationBtn = document.getElementById('notificationBtn');
  function applyTheme(theme) {
    document.body.classList.toggle('light', theme === 'light');
    settingsBtn.textContent = '⚙';
    document.querySelectorAll('[data-theme-choice]').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.themeChoice === theme);
    });
  }
  let currentTheme = localStorage.getItem('theme') || 'dark';
  applyTheme(currentTheme);
  settingsBtn.addEventListener('click', () => {
    settingsOverlay.classList.add('show');
  });
  document.getElementById('settingsClose').addEventListener('click', () => {
    settingsOverlay.classList.remove('show');
  });
  settingsOverlay.addEventListener('click', (e) => {
    if (e.target === settingsOverlay) settingsOverlay.classList.remove('show');
  });
  themeSegment.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-theme-choice]');
    if (!btn) return;
    currentTheme = btn.dataset.themeChoice;
    localStorage.setItem('theme', currentTheme);
    applyTheme(currentTheme);
  });
  notificationBtn.addEventListener('click', requestNotificationPermission);

  // --- Шпалери чату ---
  const WALLPAPERS = [
    { id: 'default', label: 'Стандарт' },
    { id: 'midnight', label: 'Північ' },
    { id: 'ocean', label: 'Океан' },
    { id: 'forest', label: 'Ліс' },
    { id: 'sunset', label: 'Захід' },
    { id: 'rose', label: 'Розі' },
    { id: 'sand', label: 'Пісок' },
    { id: 'dots', label: 'Крапки' },
    { id: 'grid', label: 'Сітка' },
  ];
  const wallpaperSwatchesEl = document.getElementById('wallpaperSwatches');
  let currentWallpaper = localStorage.getItem('wallpaper') || 'default';

  function applyWallpaper(id) {
    const messagesEl = document.getElementById('messages');
    WALLPAPERS.forEach((w) => messagesEl.classList.remove('wallpaper-' + w.id));
    messagesEl.classList.add('wallpaper-' + id);
    wallpaperSwatchesEl.querySelectorAll('.wallpaperSwatch').forEach((el) => {
      el.classList.toggle('active', el.dataset.wallpaper === id);
    });
  }

  WALLPAPERS.forEach((w) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'wallpaperSwatch wallpaper-' + w.id;
    btn.dataset.wallpaper = w.id;
    btn.innerHTML = `<span>${w.label}</span>`;
    btn.addEventListener('click', () => {
      currentWallpaper = w.id;
      localStorage.setItem('wallpaper', currentWallpaper);
      applyWallpaper(currentWallpaper);
    });
    wallpaperSwatchesEl.appendChild(btn);
  });
  applyWallpaper(currentWallpaper);

  // --- Кольорова палітра (акцент кнопок/чеків/лого) ---
  const PALETTES = [
    { id: 'classic',   label: 'Spark',    accent: '#55f5c8', hot: '#ff6f61' },
    { id: 'ocean',     label: 'Океан',    accent: '#4fc3ff', hot: '#3a6dff' },
    { id: 'violet',    label: 'Фіолет',   accent: '#a78bfa', hot: '#ec4899' },
    { id: 'sunset',    label: 'Захід',    accent: '#ffb454', hot: '#ff5277' },
    { id: 'rose',      label: 'Розі',     accent: '#ff7aa8', hot: '#ffa45c' },
    { id: 'gold',      label: 'Золото',   accent: '#e8c468', hot: '#ff8a4c' },
    { id: 'graphite',  label: 'Графіт',   accent: '#9fb4c7', hot: '#5c7a91' },
  ];
  const paletteSwatchesEl = document.getElementById('paletteSwatches');
  let currentPalette = localStorage.getItem('palette') || 'classic';

  function applyPalette(id) {
    PALETTES.forEach((p) => document.body.classList.remove('palette-' + p.id));
    document.body.classList.add('palette-' + id);
    paletteSwatchesEl.querySelectorAll('.paletteSwatch').forEach((el) => {
      el.classList.toggle('active', el.dataset.palette === id);
    });
  }

  PALETTES.forEach((p) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'paletteSwatch';
    btn.dataset.palette = p.id;
    btn.style.background = `linear-gradient(135deg, ${p.accent}, ${p.hot})`;
    btn.title = p.label;
    btn.innerHTML = `<span>${p.label}</span>`;
    btn.addEventListener('click', () => {
      currentPalette = p.id;
      localStorage.setItem('palette', currentPalette);
      applyPalette(currentPalette);
    });
    paletteSwatchesEl.appendChild(btn);
  });
  applyPalette(currentPalette);

  // --- Профіль: підпис і колір аватарки, зберігаються на сервері й видимі іншим ---
  const profileBtn = document.getElementById('profileBtn');
  const profileOverlay = document.getElementById('profileOverlay');
  const profileBioInput = document.getElementById('profileBioInput');
  const profilePreviewAvatar = document.getElementById('profilePreviewAvatar');
  const profilePreviewName = document.getElementById('profilePreviewName');
  const profilePreviewBio = document.getElementById('profilePreviewBio');
  const profileColorSwatches = document.getElementById('profileColorSwatches');
  const profileError = document.getElementById('profileError');
  const profileSaveBtn = document.getElementById('profileSave');
  let currentProfile = { bio: '', avatarColor: '' };
  let selectedProfileColor = '';

  function applyProfile() {
    const brandMark = document.querySelector('.brandMark');
    const color = currentProfile.avatarColor || avatarColor(myUsername || 'spark');
    brandMark.textContent = (myUsername || 'S').charAt(0).toUpperCase();
    brandMark.style.background = color;
    document.getElementById('myName').textContent = currentProfile.bio
      ? `@${myUsername} · ${currentProfile.bio}`
      : `@${myUsername}`;
  }

  function renderProfileSwatches() {
    profileColorSwatches.innerHTML = '';
    AVATAR_COLORS.forEach((color) => {
      const swatch = document.createElement('button');
      swatch.type = 'button';
      swatch.className = 'colorSwatch' + (color === selectedProfileColor ? ' active' : '');
      swatch.style.background = color;
      swatch.title = color;
      swatch.addEventListener('click', () => {
        selectedProfileColor = color;
        renderProfileSwatches();
        profilePreviewAvatar.style.background = color;
      });
      profileColorSwatches.appendChild(swatch);
    });
  }

  function openProfileSettings() {
    selectedProfileColor = currentProfile.avatarColor || avatarColor(myUsername || 'spark');
    profileBioInput.value = currentProfile.bio || '';
    profilePreviewName.textContent = '@' + myUsername;
    profilePreviewBio.textContent = profileBioInput.value || 'Без підпису';
    profilePreviewAvatar.textContent = (myUsername || '?').charAt(0).toUpperCase();
    profilePreviewAvatar.style.background = selectedProfileColor;
    profileError.textContent = '';
    renderProfileSwatches();
    profileOverlay.classList.add('show');
  }

  profileBtn.addEventListener('click', openProfileSettings);
  profileBioInput.addEventListener('input', () => {
    profilePreviewBio.textContent = profileBioInput.value.trim() || 'Без підпису';
  });
  document.getElementById('profileCancel').addEventListener('click', () => {
    profileOverlay.classList.remove('show');
  });
  profileOverlay.addEventListener('click', (e) => {
    if (e.target === profileOverlay) profileOverlay.classList.remove('show');
  });
  profileSaveBtn.addEventListener('click', () => {
    const bio = profileBioInput.value.trim().slice(0, 80);
    const avatarColorValue = selectedProfileColor;
    profileError.textContent = '';
    profileSaveBtn.disabled = true;
    profileSaveBtn.textContent = 'Зберігаю...';
    socket.emit('update profile', { bio, avatarColor: avatarColorValue }, (res) => {
      profileSaveBtn.disabled = false;
      profileSaveBtn.textContent = 'Зберегти';
      if (!res || !res.success) {
        profileError.textContent = (res && res.error) || 'Не вдалося зберегти профіль';
        return;
      }
      currentProfile = { bio, avatarColor: avatarColorValue };
      cacheProfile(myUsername, bio, avatarColorValue);
      applyProfile();
      fillAvatar(document.getElementById('myAvatar'), myUsername);
      renderChatList();
      profileOverlay.classList.remove('show');
    });
  });

  // --- Онлайн-статус та "друкує..." ---
  let onlineSet = new Set();
  let typingState = {}; // room -> username, хто зараз друкує в цій кімнаті
  let chatsCache = [];
  const baseTitle = document.title;
  let unreadTitleCount = 0;

  function requestNotificationPermission() {
    if (!('Notification' in window) || Notification.permission !== 'default') return;
    Notification.requestPermission().catch(() => {});
  }

  function resetPageTitle() {
    unreadTitleCount = 0;
    document.title = baseTitle;
  }

  function showToastNotification(data) {
    const toastContainer = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `
      <strong>@${escapeHtml(data.from)} написав</strong>
      <span>${escapeHtml(data.text)}</span>
    `;
    toast.addEventListener('click', () => {
      openChat(data.room, data.from);
      toast.remove();
      resetPageTitle();
      window.focus();
    });
    toastContainer.appendChild(toast);
    setTimeout(() => toast.remove(), 6000);
  }

  function formatDuration(seconds) {
    const total = Math.max(0, Math.round(Number(seconds) || 0));

  function formatMessageTime(isoString) {

  // --- Голосові повідомлення ---
  const voiceBtn = document.getElementById('voiceBtn');
  const recordingBar = document.getElementById('recordingBar');
  const recordingLabel = document.getElementById('recordingLabel');
  const MAX_VOICE_SECONDS = 120;
  let mediaRecorder = null;
  let voiceStream = null;
  let voiceChunks = [];
  let voiceStartedAt = 0;
  let voiceTimerId = null;
  let isRecordingVoice = false;
  let voiceSending = false;

  function pickVoiceMimeType() {
    const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
    return types.find((type) => MediaRecorder.isTypeSupported(type)) || '';
  }

  function updateRecordingLabel() {
    const elapsed = Math.floor((Date.now() - voiceStartedAt) / 1000);
    recordingLabel.textContent = 'Запис... ' + formatDuration(elapsed);
    if (elapsed >= MAX_VOICE_SECONDS) stopVoiceRecording(true);
  }

  async function startVoiceRecording() {
    if (!currentRoom || isRecordingVoice || voiceSending) return;
    if (!navigator.mediaDevices || !window.MediaRecorder) {
      alert('Браузер не підтримує запис голосу');
      return;
    }

    try {
      voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (_err) {
      alert('Немає доступу до мікрофона');
      return;
    }

    const mimeType = pickVoiceMimeType();
    voiceChunks = [];
    mediaRecorder = mimeType
      ? new MediaRecorder(voiceStream, { mimeType })
      : new MediaRecorder(voiceStream);

    mediaRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) voiceChunks.push(e.data);
    };

    mediaRecorder.start(250);
    isRecordingVoice = true;
    voiceStartedAt = Date.now();
    voiceBtn.classList.add('recording');
    recordingBar.classList.add('show');
    updateRecordingLabel();
    voiceTimerId = setInterval(updateRecordingLabel, 250);
  }

  function cleanupVoiceRecording() {
    clearInterval(voiceTimerId);
    voiceTimerId = null;
    isRecordingVoice = false;
    voiceBtn.classList.remove('recording');
    recordingBar.classList.remove('show');
    if (voiceStream) {
      voiceStream.getTracks().forEach((track) => track.stop());
      voiceStream = null;
    }
    mediaRecorder = null;
    voiceChunks = [];
  }

  async function sendVoiceBlob(blob, duration) {
    if (!blob || !currentRoom || voiceSending) return;
    voiceSending = true;
    voiceBtn.disabled = true;

    try {
      const formData = new FormData();
      formData.append('audio', blob, blob.type.includes('ogg') ? 'voice.ogg' : 'voice.webm');
      formData.append('token', authToken);
      formData.append('room', currentRoom);
      formData.append('duration', String(duration));

      const res = await fetch('/api/voice-message', { method: 'POST', body: formData });
      const data = await res.json();
      if (!data.success) {
        alert((data && data.error) || 'Не вдалось надіслати голосове');
      }
    } catch (_err) {
      alert('Помилка мережі під час надсилання голосового');
    } finally {
      voiceSending = false;
      voiceBtn.disabled = false;
    }
  }

  function stopVoiceRecording(shouldSend) {
    if (!isRecordingVoice || !mediaRecorder) return;
    isRecordingVoice = false;

    const recorder = mediaRecorder;
    const duration = Math.max(1, Math.round((Date.now() - voiceStartedAt) / 1000));
    const mimeType = recorder.mimeType || pickVoiceMimeType() || 'audio/webm';
    const send = shouldSend;

    recorder.onstop = async () => {
      const blob = new Blob(voiceChunks, { type: mimeType });
      cleanupVoiceRecording();
      if (send && blob.size > 0 && duration >= 1) {
        await sendVoiceBlob(blob, duration);
      }
    };

    if (recorder.state !== 'inactive') recorder.stop();
    else cleanupVoiceRecording();
  }

  function bindVoicePress(el) {
    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      startVoiceRecording();
    });
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      startVoiceRecording();
    }, { passive: false });
    el.addEventListener('mouseup', () => stopVoiceRecording(true));
    el.addEventListener('mouseleave', () => {
      if (isRecordingVoice) stopVoiceRecording(true);
    });
    el.addEventListener('touchend', (e) => {
      e.preventDefault();
      stopVoiceRecording(true);
    }, { passive: false });
    el.addEventListener('touchcancel', () => stopVoiceRecording(false));
  }

  bindVoicePress(voiceBtn);

  let currentlyPlayingAudio = null;

  function setupVoicePlayer(li) {
    const wrap = li.querySelector('.voiceMsg');
    const audio = wrap.querySelector('.voiceAudio');
    const playBtn = wrap.querySelector('.voicePlayBtn');
    const fill = wrap.querySelector('.voiceProgressFill');
    const knob = wrap.querySelector('.voiceProgressKnob');
    const bar = wrap.querySelector('.voiceProgressBar');
    const timeEl = wrap.querySelector('.voiceTime');
    const totalEl = wrap.querySelector('.voiceTotal');

    function setProgress(ratio) {
      const pct = Math.max(0, Math.min(1, ratio)) * 100;
      fill.style.width = pct + '%';
      knob.style.left = pct + '%';
    }

    audio.addEventListener('loadedmetadata', () => {
      if (isFinite(audio.duration) && audio.duration > 0) {
        totalEl.textContent = formatDuration(audio.duration);
      }
    });

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) setProgress(audio.currentTime / audio.duration);
      timeEl.textContent = formatDuration(audio.currentTime);
    });

    audio.addEventListener('play', () => {
      if (currentlyPlayingAudio && currentlyPlayingAudio !== audio) {
        currentlyPlayingAudio.pause();
      }
      currentlyPlayingAudio = audio;
      playBtn.textContent = '⏸';
      wrap.classList.add('playing');
    });

    audio.addEventListener('pause', () => {
      playBtn.textContent = '▶';
      wrap.classList.remove('playing');
    });

    audio.addEventListener('ended', () => {
      playBtn.textContent = '▶';
      wrap.classList.remove('playing');
      setProgress(0);
      timeEl.textContent = '0:00';
    });

    playBtn.addEventListener('click', () => {
      if (audio.paused) audio.play().catch(() => {});
      else audio.pause();
    });

    function seekFromEvent(e) {
      const rect = bar.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const ratio = (clientX - rect.left) / rect.width;
      if (audio.duration) {
        audio.currentTime = Math.max(0, Math.min(1, ratio)) * audio.duration;
        setProgress(ratio);
      }
    }
    bar.addEventListener('click', seekFromEvent);
  }

  function renderMessage(data) {
    const li = document.createElement('li');
    li.className = data.user === myUsername ? 'mine bubbleIn' : 'bubbleIn';
    if (data.type === 'voice') li.classList.add('voice');
    if (data.id) li.dataset.id = data.id;
    fillMessageContent(li, data);
    messages.appendChild(li);
    messages.scrollTop = messages.scrollHeight;
  }

  function fillMessageContent(li, data) {
    const isMine = data.user === myUsername;
    const createdAt = data.createdAt || li.dataset.createdAt || '';
    if (createdAt) li.dataset.createdAt = createdAt;
    if (data.deleted) {
      li.classList.add('deleted');
      li.innerHTML = `<div class="who">${escapeHtml(data.user)}</div>Повідомлення видалено`;
      return;
    }
    li.classList.remove('deleted');
    li.dataset.text = data.text || '';
    const tick = isMine
      ? `<span class="tick ${data.read ? 'read' : ''}">${data.read ? '✓✓' : '✓'}</span>`
      : '';
    const editedTag = data.edited ? '<span class="editedTag">ред.</span>' : '';
    const timeTag = createdAt ? `<span class="msgTime">${formatMessageTime(createdAt)}</span>` : '';
    const footer = `<div class="msgFooter">${editedTag}${timeTag}${tick}</div>`;
    const isVoice = data.type === 'voice' && data.mediaUrl;
    const actions = isMine && !isVoice
      ? `<span class="msgActions"><span class="editBtn" title="Редагувати">✎</span><span class="delBtn" title="Видалити">🗑</span></span>`
      : (isMine ? `<span class="msgActions"><span class="delBtn" title="Видалити">🗑</span></span>` : '');

    let bodyHtml;
    if (isVoice) {
      bodyHtml = `
        <div class="voiceMsg">
          <button type="button" class="voicePlayBtn">▶</button>
          <div class="voiceBody">
            <div class="voiceProgressBar">
              <div class="voiceProgressFill"></div>
              <div class="voiceProgressKnob"></div>
            </div>
            <div class="voiceMeta">
              <span class="voiceTime">0:00</span>
              <span class="voiceTotal">${formatDuration(data.duration)}</span>
            </div>
          </div>
          <audio class="voiceAudio" preload="metadata" src="${escapeHtml(data.mediaUrl)}"></audio>
        </div>`;
    } else {
      bodyHtml = `<span class="msgText">${escapeHtml(data.text)}</span>`;
    }

    li.innerHTML = `${actions}<div class="who">${escapeHtml(data.user)}</div>${bodyHtml}${footer}`;

    if (isVoice) setupVoicePlayer(li);

    if (isMine) {
      const delBtn = li.querySelector('.delBtn');
      delBtn.addEventListener('click', () => deleteMessage(li, data));
      const editBtn = li.querySelector('.editBtn');
      if (editBtn) editBtn.addEventListener('click', () => startEdit(li, data));
    }
  }

  function startEdit(li, data) {
    const id = li.dataset.id;
    li.innerHTML = `
      <div class="who">${escapeHtml(data.user)}</div>
      <input class="editInput" value="${escapeHtml(li.dataset.text)}" />
      <div class="editRow">
        <button class="editSave">Зберегти</button>
        <button class="editCancel">Скасувати</button>
      </div>
    `;
    const editInput = li.querySelector('.editInput');
    editInput.focus();
    editInput.setSelectionRange(editInput.value.length, editInput.value.length);

    const cancel = () => fillMessageContent(li, data);
    li.querySelector('.editCancel').addEventListener('click', cancel);

    const save = () => {
      const newText = editInput.value.trim();
      if (!newText) return;
      socket.emit('edit message', { room: currentRoom, id, text: newText }, (res) => {
        if (!res || !res.success) {
          alert((res && res.error) || 'Не вдалось зберегти');
          fillMessageContent(li, data);
          return;
        }
        // Локальне оновлення відбудеться через подію 'message edited'
      });
    };
    li.querySelector('.editSave').addEventListener('click', save);
    editInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); save(); }
      if (e.key === 'Escape') cancel();
    });
  }

  function deleteMessage(li, data) {
    if (!confirm('Видалити це повідомлення?')) return;
    const id = li.dataset.id;
    socket.emit('delete message', { room: currentRoom, id }, (res) => {
      if (!res || !res.success) {
        alert((res && res.error) || 'Не вдалось видалити');
      }
      // Видалення UI відбудеться через подію 'message deleted'
    });
  }

  socket.on('new message notification', (data) => {
    if (!myUsername || data.from === myUsername) return;

    loadChats();
    const isOpenAndVisible = data.room === currentRoom && !document.hidden;
    if (isOpenAndVisible) return;

    unreadTitleCount += 1;
    document.title = `(${unreadTitleCount}) ${baseTitle}`;
    showToastNotification(data);
    showBrowserNotification(data);
  });

  socket.on('chat message', (data) => {
    renderMessage(data);
    loadChats();
  });

  socket.on('message edited', (data) => {
    if (data.room !== currentRoom) { loadChats(); return; }
    const li = messages.querySelector(`li[data-id="${data.id}"]`);
    if (li) {
      const isMine = li.classList.contains('mine');
      fillMessageContent(li, {
        user: isMine ? myUsername : currentPartner,
        text: data.text,
        type: data.type || 'text',
        mediaUrl: data.mediaUrl,
        duration: data.duration,
        edited: true,
        read: li.querySelector('.tick.read') !== null,
        deleted: false,
      });
    }
    loadChats();
  });

  socket.on('message deleted', (data) => {
    if (data.room !== currentRoom) { loadChats(); return; }
    const li = messages.querySelector(`li[data-id="${data.id}"]`);
    if (li) {
      const isMine = li.classList.contains('mine');
      fillMessageContent(li, { user: isMine ? myUsername : currentPartner, deleted: true });
    }
    loadChats();
  });

  // Співрозмовник прочитав наші повідомлення — оновлюємо галочки на ✓✓
  socket.on('messages read', (data) => {
    if (data.room !== currentRoom) return;
    (data.ids || []).forEach((id) => {
      const li = messages.querySelector(`li[data-id="${id}"]`);
      if (li) {
        const t = li.querySelector('.tick');
        if (t) {
          t.textContent = '✓✓';
          t.classList.add('read');
        }
      }
    });
    loadChats();
  });

  // --- Онлайн/офлайн статус співрозмовника ---
  socket.on('user status', (data) => {
    const key = (data.user || data.username || '').toLowerCase();
    if (!key) return;
    if (data.online) onlineSet.add(key);
    else onlineSet.delete(key);
    renderChatList();
    if (currentPartner && currentPartner.toLowerCase() === key) {
      updateChatHeaderStatus();
    }
  });

  // --- Хтось змінив підпис/колір аватарки ---
  socket.on('profile updated', (data) => {
    const username = data && data.username;
    if (!username) return;
    cacheProfile(username, data.bio, data.avatarColor);
    renderChatList();
    if (currentPartner && currentPartner.toLowerCase() === username.toLowerCase()) {
      fillAvatar(chatHeaderAvatar, currentPartner);
      updateChatHeaderStatus();
    }
  });

  // --- Хтось друкує ---
  socket.on('typing', (data) => {
    typingState[data.room] = data.user;
    renderChatList();
    if (data.room === currentRoom) updateChatHeaderStatus();
  });

  socket.on('stop typing', (data) => {
    delete typingState[data.room];
    renderChatList();
    if (data.room === currentRoom) updateChatHeaderStatus();
  });
</script>
</body>
</html>
